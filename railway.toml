[build]
builder = "NIXPACKS"

[deploy]
startCommand = "uvicorn server:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
# First boot downloads the embedding model (~80MB) + torch, so give it room.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistência dos bancos SQLite (products.db, rag.db):
#   1. Crie um Volume no serviço (Settings -> Volumes) com mount path /app/data
#   2. Defina a variável de ambiente DB_DIR = /app/data
# Sem isso, os bancos sao recriados/repopulados a cada deploy (efemero).
