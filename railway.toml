[build]
builder = "NIXPACKS"
# Força a instalação das devDependencies (typescript/eslint) para o `next build`.
buildCommand = "npm install --include=dev && npm run build"

[deploy]
# Aplica a extensão pgvector + schema + seed (idempotente) e sobe o Next.
startCommand = "npm run db:setup && npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Banco: provisione um Postgres (com a extensão pgvector — imagem pgvector/pgvector
# ou plugin Postgres do Railway >= 16) e exponha DATABASE_URL ao serviço.
# Não há mais Volume nem SQLite: o estado vive no Postgres.
